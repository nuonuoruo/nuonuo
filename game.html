<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>小游戏</title>
  <style>
    :root {
      --bg1: #f2f6ff;
      --bg2: #fff7fb;
      --bg3: #f7fff7;
      --text: #1d1d1f;
      --subtext: #6e6e73;
      --panel: rgba(255, 255, 255, 0.72);
      --panel-strong: rgba(255, 255, 255, 0.9);
      --stroke: rgba(255, 255, 255, 0.8);
      --shadow: 0 18px 50px rgba(0, 0, 0, 0.08);
      --shadow-soft: 0 8px 24px rgba(0, 0, 0, 0.06);
      --primary: #0a84ff;
      --primary-2: #0071e3;
      --danger: #ff3b30;
      --radius-xl: 28px;
      --radius-lg: 22px;
      --radius-md: 16px;
      --radius-sm: 12px;
    }

    * { box-sizing: border-box; }

    html, body {
      margin: 0;
      min-height: 100%;
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", "SF Pro Text",
        "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", sans-serif;
      -webkit-font-smoothing: antialiased;
      text-rendering: optimizeLegibility;
      background:
        radial-gradient(circle at 12% 12%, rgba(0, 113, 227, 0.12), transparent 18%),
        radial-gradient(circle at 85% 15%, rgba(255, 80, 120, 0.12), transparent 16%),
        radial-gradient(circle at 70% 88%, rgba(80, 200, 120, 0.10), transparent 18%),
        linear-gradient(180deg, #fbfbfd 0%, #f5f5f7 100%);
    }

    body {
      padding: 20px;
    }

    .page {
      max-width: 980px;
      margin: 0 auto;
      min-height: calc(100vh - 40px);
      display: flex;
      flex-direction: column;
      gap: 18px;
    }

    .topbar {
      background: rgba(255, 255, 255, 0.72);
      backdrop-filter: saturate(180%) blur(22px);
      -webkit-backdrop-filter: saturate(180%) blur(22px);
      border: 1px solid rgba(255, 255, 255, 0.72);
      border-radius: 24px;
      box-shadow: var(--shadow-soft);
      padding: 14px 16px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 14px;
      flex-wrap: wrap;
    }

    .topbar-left {
      display: flex;
      align-items: center;
      gap: 12px;
      min-width: 0;
      flex-wrap: wrap;
    }

    .back-btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      padding: 10px 14px;
      border-radius: 999px;
      background: rgba(0, 0, 0, 0.06);
      color: var(--text);
      text-decoration: none;
      font-size: 13px;
      font-weight: 700;
      white-space: nowrap;
      -webkit-tap-highlight-color: transparent;
      transition: transform .15s ease, background .2s ease, box-shadow .2s ease;
    }

    .back-btn:hover {
      transform: translateY(-1px);
      background: rgba(0, 0, 0, 0.08);
    }

    .brand-row {
      display: flex;
      align-items: center;
      gap: 12px;
      min-width: 0;
      text-decoration: none;
      color: inherit;
    }

    .brand-dot {
      width: 12px;
      height: 12px;
      border-radius: 999px;
      background: linear-gradient(180deg, #2c8cff 0%, #0066d6 100%);
      box-shadow: 0 0 0 6px rgba(44, 140, 255, 0.10);
      flex: 0 0 auto;
    }

    .brand-title {
      font-size: 15px;
      font-weight: 700;
      color: var(--text);
      white-space: nowrap;
    }

    .auth-box {
      display: flex;
      align-items: center;
      gap: 10px;
      flex-wrap: wrap;
    }

    .auth-status {
      font-size: 13px;
      color: var(--subtext);
      padding: 8px 12px;
      border-radius: 999px;
      background: rgba(255, 255, 255, 0.42);
      border: 1px solid rgba(0, 0, 0, 0.05);
      white-space: nowrap;
    }

    .btn {
      border: none;
      border-radius: 999px;
      font-weight: 700;
      cursor: pointer;
      user-select: none;
      -webkit-tap-highlight-color: transparent;
      transition: transform .15s ease, background .2s ease, box-shadow .2s ease, opacity .2s ease;
      text-decoration: none;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      padding: 12px 18px;
      font-size: 14px;
    }

    .btn:hover { transform: translateY(-1px); }

    .primary-btn {
      background: linear-gradient(180deg, #0a84ff 0%, #0071e3 100%);
      color: #fff;
      box-shadow: 0 10px 22px rgba(0,113,227,.24);
    }

    .ghost-btn {
      background: rgba(0,0,0,.06);
      color: var(--text);
    }

    .danger-btn {
      background: rgba(255,59,48,.92);
      color: #fff;
      box-shadow: 0 8px 18px rgba(255,59,48,.18);
    }

    .hero-wrap {
      flex: 1;
      display: flex;
      align-items: stretch;
      justify-content: center;
      padding-top: 2px;
    }

    .hero {
      width: min(100%, 920px);
      background: rgba(255, 255, 255, 0.72);
      backdrop-filter: saturate(180%) blur(24px);
      -webkit-backdrop-filter: saturate(180%) blur(24px);
      border: 1px solid rgba(255, 255, 255, 0.82);
      border-radius: 30px;
      box-shadow: var(--shadow);
      padding: 28px;
      overflow: hidden;
      position: relative;
    }

    .hero::before {
      content: "";
      position: absolute;
      inset: auto -120px -120px auto;
      width: 280px;
      height: 280px;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(255, 45, 85, 0.10) 0%, rgba(255,45,85,0) 70%);
      pointer-events: none;
    }

    .game-header {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 18px;
      flex-wrap: wrap;
    }

    .game-header h1 {
      margin: 0;
      font-size: clamp(30px, 4.5vw, 48px);
      line-height: 1.08;
      letter-spacing: -0.06em;
      font-weight: 900;
    }

    .game-header p {
      margin: 10px 0 0;
      color: var(--subtext);
      font-size: 16px;
      line-height: 1.8;
      max-width: 660px;
    }

    .game-stats {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      align-items: center;
      justify-content: flex-end;
    }

    .stat-chip {
      padding: 10px 14px;
      border-radius: 999px;
      background: rgba(255,255,255,.7);
      border: 1px solid rgba(0,0,0,.06);
      color: var(--text);
      font-size: 13px;
      font-weight: 700;
      white-space: nowrap;
    }

    .stat-chip strong {
      font-size: 16px;
    }

    .current-data-card {
      margin-top: 16px;
      border-radius: 22px;
      background: rgba(255,255,255,.68);
      border: 1px solid rgba(0,0,0,.06);
      box-shadow: var(--shadow-soft);
      padding: 16px 16px 15px;
    }

    .current-data-card .info-title {
      font-size: 14px;
      font-weight: 800;
      color: var(--text);
      margin-bottom: 8px;
    }

    .current-data-card p {
      margin: 0;
      color: var(--subtext);
      font-size: 14px;
      line-height: 1.75;
    }

    .game-board {
      margin-top: 18px;
      display: grid;
      grid-template-columns: minmax(300px, 420px) minmax(260px, 1fr);
      gap: 20px;
      align-items: center;
    }

    .heart-button {
      position: relative;
      width: 100%;
      border: none;
      padding: 0;
      background:
        radial-gradient(circle at 30% 20%, rgba(255,255,255,.80), rgba(255,255,255,.18) 36%, rgba(255,255,255,.04) 68%),
        rgba(255,255,255,.58);
      border-radius: 32px;
      box-shadow:
        0 18px 40px rgba(255,45,85,.10),
        inset 0 1px 0 rgba(255,255,255,.35);
      overflow: hidden;
      cursor: pointer;
      aspect-ratio: 1 / 1;
      display: grid;
      place-items: center;
      -webkit-tap-highlight-color: transparent;
      transition: transform .18s ease, box-shadow .18s ease, opacity .18s ease, filter .18s ease;
    }

    .heart-button:hover {
      transform: translateY(-2px);
      box-shadow:
        0 24px 52px rgba(255,45,85,.14),
        inset 0 1px 0 rgba(255,255,255,.38);
    }

    .heart-button:disabled {
      cursor: not-allowed;
      opacity: .70;
      transform: none;
    }

    .heart-button.upgrade-pop {
      animation: upgradePop .65s cubic-bezier(.2,.9,.2,1);
    }

    .heart-button.upgrade-pop::after {
      content: "";
      position: absolute;
      inset: 0;
      border-radius: inherit;
      pointer-events: none;
      animation: upgradeFlash .65s ease;
      background:
        radial-gradient(circle at 50% 45%, rgba(255,255,255,.62), transparent 28%),
        radial-gradient(circle at 50% 50%, rgba(255,45,85,.22), transparent 58%);
    }

    .heart-badge {
      position: absolute;
      top: 14px;
      left: 50%;
      transform: translateX(-50%);
      z-index: 4;
      padding: 10px 16px;
      min-width: 98px;
      border-radius: 999px;
      background: rgba(255,255,255,.78);
      border: 1px solid rgba(0,0,0,.06);
      box-shadow: 0 8px 20px rgba(0,0,0,.06);
      text-align: center;
      backdrop-filter: blur(12px);
    }

    .heart-badge .num {
      display: block;
      font-size: 26px;
      line-height: 1;
      font-weight: 900;
      color: #ff2d55;
      letter-spacing: -0.05em;
    }

    .heart-badge .label {
      display: block;
      margin-top: 4px;
      font-size: 12px;
      color: var(--subtext);
      font-weight: 700;
    }

    .heart-stage {
      width: min(92%, 330px);
      aspect-ratio: 1 / 1;
      display: grid;
      place-items: center;
      position: relative;
      z-index: 1;
      transition: transform .22s ease, filter .22s ease;
    }

    .heart-stage.pulse {
      animation: heartPulse .65s ease;
    }

    .heart-stage svg {
      width: 100%;
      height: auto;
      display: block;
      filter: drop-shadow(0 14px 24px rgba(255,45,85,.18));
    }

    .game-side {
      display: grid;
      gap: 14px;
    }

    .info-card {
      border-radius: 22px;
      background: rgba(255,255,255,.68);
      border: 1px solid rgba(0,0,0,.06);
      box-shadow: var(--shadow-soft);
      padding: 16px 16px 15px;
    }

    .info-title {
      font-size: 14px;
      font-weight: 800;
      color: var(--text);
      margin-bottom: 8px;
    }

    .info-card p {
      margin: 0;
      color: var(--subtext);
      font-size: 14px;
      line-height: 1.75;
    }

    .game-footer {
      margin-top: 18px;
      display: flex;
      justify-content: space-between;
      gap: 12px;
      flex-wrap: wrap;
      align-items: center;
    }

    .tip {
      color: var(--subtext);
      font-size: 13px;
      line-height: 1.7;
      padding: 10px 14px;
      border-radius: 999px;
      background: rgba(255,255,255,.56);
      border: 1px solid rgba(0,0,0,.05);
    }

    .lock-overlay {
      margin-top: 24px;
      display: none;
      align-items: center;
      justify-content: center;
      min-height: 360px;
    }

    .lock-card {
      width: min(100%, 420px);
      border-radius: 24px;
      background: rgba(255,255,255,.80);
      border: 1px solid rgba(255,255,255,.72);
      box-shadow: var(--shadow);
      padding: 28px 22px;
      text-align: center;
    }

    .lock-emoji {
      font-size: 42px;
      line-height: 1;
      margin-bottom: 10px;
    }

    .lock-card h2 {
      margin: 0;
      font-size: 24px;
      letter-spacing: -0.04em;
    }

    .lock-card p {
      margin: 10px 0 18px;
      color: var(--subtext);
      font-size: 14px;
      line-height: 1.8;
    }

    .floating-hearts,
    .burst-particles {
      position: absolute;
      inset: 0;
      overflow: hidden;
      pointer-events: none;
      z-index: 3;
    }

    .float-heart {
      position: absolute;
      left: 50%;
      top: 50%;
      width: 14px;
      height: 14px;
      transform: translate(-50%, -50%) rotate(45deg);
      background: #ff2d55;
      border-radius: 3px;
      opacity: 0;
      filter: drop-shadow(0 4px 8px rgba(255,45,85,.18));
      animation: floatUp var(--duration) cubic-bezier(.2,.7,.2,1) forwards;
    }

    .float-heart::before,
    .float-heart::after {
      content: "";
      position: absolute;
      width: 14px;
      height: 14px;
      background: inherit;
      border-radius: 50%;
    }

    .float-heart::before { left: -7px; top: 0; }
    .float-heart::after { left: 0; top: -7px; }

    .burst-particle {
      position: absolute;
      left: 50%;
      top: 50%;
      width: var(--size);
      height: var(--size);
      border-radius: 999px;
      background: var(--color);
      opacity: 0;
      transform: translate(-50%, -50%) translate(0, 0) scale(.8);
      filter: drop-shadow(0 4px 8px rgba(255,45,85,.18));
      animation: burstParticle var(--duration) cubic-bezier(.2,.9,.2,1) forwards;
    }

    .toast {
      position: fixed;
      left: 50%;
      bottom: 22px;
      transform: translateX(-50%);
      background: rgba(20, 20, 20, 0.84);
      color: #fff;
      padding: 10px 14px;
      border-radius: 999px;
      font-size: 13px;
      z-index: 500;
      opacity: 0;
      pointer-events: none;
      transition: opacity .2s ease, transform .2s ease;
    }

    .toast.show {
      opacity: 1;
      transform: translateX(-50%) translateY(-4px);
    }

    @keyframes floatUp {
      0% {
        opacity: 0;
        transform: translate(-50%, -50%) translate(var(--x0), var(--y0)) scale(.4) rotate(45deg);
      }
      12% {
        opacity: 1;
      }
      100% {
        opacity: 0;
        transform: translate(-50%, -50%) translate(var(--x1), var(--y1)) scale(1.35) rotate(45deg);
      }
    }

    @keyframes burstParticle {
      0% {
        opacity: 0;
        transform: translate(-50%, -50%) translate(0, 0) scale(.55);
      }
      10% {
        opacity: 1;
      }
      100% {
        opacity: 0;
        transform: translate(-50%, -50%) translate(var(--dx), var(--dy)) scale(0);
      }
    }

    @keyframes heartPulse {
      0%   { transform: scale(1); }
      35%  { transform: scale(1.045); }
      70%  { transform: scale(.985); }
      100% { transform: scale(1); }
    }

    @keyframes upgradePop {
      0%   { transform: scale(1); }
      30%  { transform: scale(1.03); }
      55%  { transform: scale(1.075); }
      100% { transform: scale(1); }
    }

    @keyframes upgradeFlash {
      0%   { opacity: 0; transform: scale(.92); }
      25%  { opacity: 1; }
      100% { opacity: 0; transform: scale(1.12); }
    }

    @media (max-width: 820px) {
      .game-board {
        grid-template-columns: 1fr;
      }
      .heart-stage {
        width: min(88%, 300px);
      }
    }

    @media (max-width: 720px) {
      body { padding: 12px; }
      .page {
        min-height: calc(100vh - 24px);
      }
      .topbar {
        border-radius: 22px;
        padding: 12px 14px;
      }
      .topbar-left {
        width: 100%;
      }
      .back-btn {
        padding: 9px 12px;
        font-size: 12px;
      }
      .hero {
        border-radius: 24px;
        padding: 20px 16px 18px;
      }
      .game-header p {
        font-size: 14px;
      }
      .game-stats {
        justify-content: flex-start;
      }
      .heart-button {
        border-radius: 26px;
      }
      .heart-badge .num {
        font-size: 24px;
      }
      .btn {
        width: 100%;
      }
      .auth-box {
        width: 100%;
      }
    }
  </style>
</head>
<body>
  <div class="page">
    <header class="topbar">
      <div class="topbar-left">
        <a class="back-btn" href="./index.html" aria-label="返回主页">← 返回主页</a>
        <a class="brand-row" href="./index.html" aria-label="返回主页">
          <div class="brand-dot" aria-hidden="true"></div>
          <div class="brand-title">小游戏</div>
        </a>
      </div>

      <div class="auth-box" id="authBox"></div>
    </header>

    <main class="hero-wrap">
      <section class="hero">
        <div class="game-header">
          <div>
            <h1>爱意升级</h1>
        
          </div>

          <div class="game-stats">
            <div class="stat-chip">当前等级：<strong id="levelText">0</strong></div>
            <div class="stat-chip" id="progressChip">0 / 6</div>
          </div>
        </div>

        <div class="current-data-card">
          <div class="info-title">当前数据</div>
          <p id="dataInfoText">正在读取中…</p>
        </div>

        <div class="game-board" id="gameBoard">
          <button class="heart-button" id="heartBtn" type="button" aria-label="点击爱心增加颜色">
            <div class="floating-hearts" id="floatingHearts"></div>
            <div class="burst-particles" id="burstParticles"></div>

            <div class="heart-badge">
              <span class="num" id="totalClicksText">0</span>
              <span class="label">总点击</span>
            </div>

            <div class="heart-stage" id="heartStage"></div>
          </button>

          <div class="game-side">
            <div class="info-card">
              <div class="info-title">玩法说明</div>
              <p id="ruleText">点击爱心即可增加颜色。当前等级越高，填满所需的点击次数越多。</p>
            </div>
          </div>
        </div>

        <div class="lock-overlay" id="lockOverlay">
          <div class="lock-card">
            <div class="lock-emoji">🔒</div>
            <h2>请先在主页登录</h2>
            <p>小游戏会按账号保存数据。先回主页登录或注册，再回来就可以继续玩，而且进度会自动同步到你的 COS 桶。</p>
            <a class="btn primary-btn" href="./index.html">返回主页</a>
          </div>
        </div>

        <div class="game-footer">
          <div class="tip" id="tipText">提示：每次点满都会自动升一级，等级越高，填满需要的次数越多。</div>
        </div>
      </section>
    </main>
  </div>

  <div class="toast" id="toast"></div>

  <script src="https://cdn.jsdelivr.net/npm/cos-js-sdk-v5/dist/cos-js-sdk-v5.min.js"></script>
  <script>
    const SECRET_ID = 'AKIDhojT7ey61jEkHhw0830qVyGUWSDpFnEW';
    const SECRET_KEY = 'GNIAMaieZyOehhWBi9QWUL4czCHAsQuG';
    const BUCKET = 'photoalbum-123456-1395234423';
    const REGION = 'ap-beijing';

    const AUTH_USER_PREFIX = 'users/';
    const GAME_STATE_PREFIX = 'games/';
    const LS_CURRENT_USER = 'site_current_user_v1';

    const cos = new COS({
      SecretId: SECRET_ID,
      SecretKey: SECRET_KEY,
    });

    const authBox = document.getElementById('authBox');
    const heartBtn = document.getElementById('heartBtn');
    const heartStage = document.getElementById('heartStage');
    const levelText = document.getElementById('levelText');
    const progressChip = document.getElementById('progressChip');
    const totalClicksText = document.getElementById('totalClicksText');
    const ruleText = document.getElementById('ruleText');
    const dataInfoText = document.getElementById('dataInfoText');
    const tipText = document.getElementById('tipText');
    const lockOverlay = document.getElementById('lockOverlay');
    const gameBoard = document.getElementById('gameBoard');
    const toast = document.getElementById('toast');
    const floatingHearts = document.getElementById('floatingHearts');
    const burstParticles = document.getElementById('burstParticles');

    let currentUser = null;
    let gameState = defaultGameState();
    let saveChain = Promise.resolve();
    let isLoaded = false;

    function defaultGameState() {
      return {
        level: 0,
        progress: 0,
        totalClicks: 0,
        updatedAt: null
      };
    }

    function escapeHtml(str) {
      return String(str || '')
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;')
        .replace(/'/g, '&#39;');
    }

    function getCurrentUser() {
      try {
        const raw = localStorage.getItem(LS_CURRENT_USER);
        if (!raw) return null;
        const user = JSON.parse(raw);
        if (!user || !user.username) return null;
        return user;
      } catch {
        return null;
      }
    }

    function setCurrentUser(user) {
      if (!user) {
        localStorage.removeItem(LS_CURRENT_USER);
      } else {
        localStorage.setItem(LS_CURRENT_USER, JSON.stringify(user));
      }
      currentUser = getCurrentUser();
      renderAuthState();
      refreshAccessState();
    }

    function makeGameKey(username) {
      return `${GAME_STATE_PREFIX}${encodeURIComponent(username)}/heart.json`;
    }

    function makeUserKey(username) {
      return `${AUTH_USER_PREFIX}${encodeURIComponent(username)}.json`;
    }

    function putJsonToCos(key, obj) {
      return new Promise((resolve, reject) => {
        cos.putObject({
          Bucket: BUCKET,
          Region: REGION,
          Key: key,
          Body: JSON.stringify(obj, null, 2),
          ContentType: 'application/json; charset=utf-8',
        }, function (err, data) {
          if (err) return reject(err);
          resolve(data);
        });
      });
    }

    function getObjectText(key) {
      return new Promise((resolve, reject) => {
        cos.getObject({
          Bucket: BUCKET,
          Region: REGION,
          Key: key,
        }, async function (err, data) {
          if (err) return reject(err);
          try {
            const body = data.Body;
            if (typeof body === 'string') return resolve(body);
            if (body instanceof Blob) return resolve(await body.text());
            if (body && typeof body.text === 'function') return resolve(await body.text());
            if (body instanceof ArrayBuffer) {
              return resolve(new TextDecoder('utf-8').decode(body));
            }
            if (ArrayBuffer.isView(body)) {
              return resolve(new TextDecoder('utf-8').decode(body));
            }
            resolve(String(body || ''));
          } catch (e) {
            reject(e);
          }
        });
      });
    }

    async function getUserByName(username) {
      const key = makeUserKey(username);
      try {
        const text = await getObjectText(key);
        return JSON.parse(text);
      } catch (err) {
        if (err && (err.statusCode === 404 || (err.error && err.error.Code === 'NoSuchKey'))) {
          return null;
        }
        if (String(err && err.message || '').includes('404')) return null;
        throw err;
      }
    }

    function clicksToFill(level) {
      return 6 + (level * 2);
    }

    function renderHeartSvg(progressPercent) {
      const pct = Math.max(0, Math.min(100, progressPercent));
      const fillHeight = 180 * (pct / 100);

      return `
        <svg viewBox="0 0 200 180" fill="none" aria-hidden="true">
          <defs>
            <clipPath id="heartClip">
              <path d="M100 167
                C 88 156, 34 119, 22 91
                C 8 60, 18 24, 48 15
                C 69 9, 86 17, 100 33
                C 114 17, 131 9, 152 15
                C 182 24, 192 60, 178 91
                C 166 119, 112 156, 100 167
                Z"/>
            </clipPath>
            <linearGradient id="fillGrad" x1="0%" y1="100%" x2="0%" y2="0%">
              <stop offset="0%" stop-color="#ff86ab"/>
              <stop offset="55%" stop-color="#ff4f7d"/>
              <stop offset="100%" stop-color="#ff2d55"/>
            </linearGradient>
          </defs>

          <path
            d="M100 167
               C 88 156, 34 119, 22 91
               C 8 60, 18 24, 48 15
               C 69 9, 86 17, 100 33
               C 114 17, 131 9, 152 15
               C 182 24, 192 60, 178 91
               C 166 119, 112 156, 100 167
               Z"
            fill="rgba(255,255,255,.28)"
            stroke="rgba(255,255,255,.84)"
            stroke-width="4.5"
          />

          <rect
            x="0"
            y="${180 - fillHeight}"
            width="200"
            height="${fillHeight}"
            fill="url(#fillGrad)"
            clip-path="url(#heartClip)"
          />

          <path
            d="M100 167
               C 88 156, 34 119, 22 91
               C 8 60, 18 24, 48 15
               C 69 9, 86 17, 100 33
               C 114 17, 131 9, 152 15
               C 182 24, 192 60, 178 91
               C 166 119, 112 156, 100 167
               Z"
            fill="none"
            stroke="rgba(255,255,255,.75)"
            stroke-width="4"
          />

          <path
            d="M63 40c9-8 22-10 34-5"
            stroke="rgba(255,255,255,.52)"
            stroke-width="7"
            stroke-linecap="round"
            opacity=".55"
          />
        </svg>
      `;
    }

    function renderGame() {
      const need = clicksToFill(gameState.level);
      const percent = need > 0 ? (gameState.progress / need) * 100 : 0;

      levelText.textContent = String(gameState.level);
      progressChip.textContent = `${gameState.progress} / ${need}`;
      totalClicksText.textContent = String(gameState.totalClicks);
      heartStage.innerHTML = renderHeartSvg(percent);

      ruleText.textContent = `当前等级 ${gameState.level}，还需要 ${need - gameState.progress} 次点击即可填满并升级。`;
      dataInfoText.textContent = currentUser
        ? `账号：${currentUser.username} ｜ 等级：${gameState.level} ｜ 进度：${gameState.progress}/${need} ｜ 总点击：${gameState.totalClicks}`
        : '未登录，暂无法读取和保存游戏数据。';

      heartBtn.disabled = !currentUser;
      heartBtn.setAttribute('aria-disabled', String(!currentUser));
    }

    function showToast(message) {
      toast.textContent = message;
      toast.classList.add('show');
      clearTimeout(showToast._timer);
      showToast._timer = setTimeout(() => {
        toast.classList.remove('show');
      }, 1600);
    }

    function setTip(message) {
      tipText.textContent = message;
    }

    function renderAuthState() {
      if (currentUser) {
        authBox.innerHTML = `
          <div class="auth-status">当前登录：${escapeHtml(currentUser.username)}</div>
          <button class="btn danger-btn" id="logoutBtn" type="button">退出登录</button>
        `;
      } else {
        authBox.innerHTML = `
          <div class="auth-status">未登录</div>
          <a class="btn primary-btn" href="./index.html">返回主页登录</a>
        `;
      }

      const logoutBtn = document.getElementById('logoutBtn');
      if (logoutBtn) {
        logoutBtn.onclick = () => {
          if (!confirm('确定要退出登录吗？')) return;
          setCurrentUser(null);
          gameState = defaultGameState();
          renderGame();
          setTip('你已退出登录，返回主页登录后才能继续玩。');
          showToast('已退出登录');
          refreshAccessState();
        };
      }
    }

    function refreshAccessState() {
      const unlocked = !!currentUser;
      lockOverlay.style.display = unlocked ? 'none' : 'flex';
      gameBoard.style.display = unlocked ? 'grid' : 'none';

      if (unlocked) {
        loadGameState().catch(err => {
          console.error(err);
          setTip('读取游戏数据失败，请检查 COS 配置、Bucket、Region 或网络。');
          showToast('读取失败');
        });
      }
    }

    async function loadGameState() {
      if (!currentUser) return;

      const key = makeGameKey(currentUser.username);
      setTip('正在读取你的游戏数据…');

      try {
        const text = await getObjectText(key);
        const parsed = JSON.parse(text);
        gameState = {
          ...defaultGameState(),
          ...parsed
        };
        isLoaded = true;
        renderGame();
        setTip('数据已读取完成，开始点击爱心吧！');
        showToast('已读取游戏数据');
      } catch (err) {
        if (err && (err.statusCode === 404 || (err.error && err.error.Code === 'NoSuchKey'))) {
          gameState = defaultGameState();
          isLoaded = true;
          renderGame();
          setTip('这是一个新的记录，点击爱心开始吧！');
          showToast('新记录已准备好');
          return;
        }
        console.error(err);
        setTip('读取失败，但你仍然可以继续玩；稍后会尝试保存。');
        renderGame();
      }
    }

    function queueSaveGameState() {
      if (!currentUser) return Promise.resolve();

      const snapshot = {
        ...gameState,
        username: currentUser.username,
        updatedAt: new Date().toISOString()
      };
      gameState.updatedAt = snapshot.updatedAt;

      const key = makeGameKey(currentUser.username);

      saveChain = saveChain
        .then(() => {
          return putJsonToCos(key, snapshot);
        })
        .catch(err => {
          console.error(err);
          showToast('保存失败');
        });

      return saveChain;
    }

    function spawnFloatingHearts() {
      const count = 6;
      for (let i = 0; i < count; i++) {
        const heart = document.createElement('span');
        heart.className = 'float-heart';

        const size = 10 + Math.random() * 10;
        const angle = Math.random() * Math.PI * 2;
        const distance = 60 + Math.random() * 85;
        const rise = 70 + Math.random() * 80;
        const x0 = (Math.cos(angle) * 8).toFixed(1) + 'px';
        const y0 = (Math.sin(angle) * 8).toFixed(1) + 'px';
        const x1 = (Math.cos(angle) * distance).toFixed(1) + 'px';
        const y1 = (-rise).toFixed(1) + 'px';
        const duration = (700 + Math.random() * 500).toFixed(0) + 'ms';

        heart.style.width = size + 'px';
        heart.style.height = size + 'px';
        heart.style.setProperty('--x0', x0);
        heart.style.setProperty('--y0', y0);
        heart.style.setProperty('--x1', x1);
        heart.style.setProperty('--y1', y1);
        heart.style.setProperty('--duration', duration);

        const offsetX = (Math.random() * 80 - 40).toFixed(1);
        const offsetY = (Math.random() * 50 - 20).toFixed(1);
        heart.style.left = `calc(50% + ${offsetX}px)`;
        heart.style.top = `calc(50% + ${offsetY}px)`;

        const hue = 340 + Math.random() * 20;
        heart.style.background = `hsl(${hue}, 95%, 60%)`;

        floatingHearts.appendChild(heart);
        setTimeout(() => heart.remove(), 1300);
      }
    }

    function spawnBurstParticles() {
      const rect = heartBtn.getBoundingClientRect();
      const count = 14;

      for (let i = 0; i < count; i++) {
        const particle = document.createElement('span');
        particle.className = 'burst-particle';

        const angle = (Math.PI * 2 * i) / count + (Math.random() * 0.28 - 0.14);
        const distance = 36 + Math.random() * 58;
        const dx = Math.cos(angle) * distance;
        const dy = Math.sin(angle) * distance - (12 + Math.random() * 20);
        const size = 4 + Math.random() * 5;
        const duration = (520 + Math.random() * 260).toFixed(0) + 'ms';
        const hue = 340 + Math.random() * 18;

        particle.style.setProperty('--dx', `${dx.toFixed(1)}px`);
        particle.style.setProperty('--dy', `${dy.toFixed(1)}px`);
        particle.style.setProperty('--size', `${size.toFixed(1)}px`);
        particle.style.setProperty('--duration', duration);
        particle.style.setProperty('--color', `hsl(${hue}, 95%, 62%)`);

        const xShift = (Math.random() * 18 - 9).toFixed(1);
        const yShift = (Math.random() * 18 - 9).toFixed(1);
        particle.style.left = `calc(50% + ${xShift}px)`;
        particle.style.top = `calc(50% + ${yShift}px)`;

        burstParticles.appendChild(particle);
        setTimeout(() => particle.remove(), 900);
      }
    }

    function triggerUpgradeAnimation() {
      heartBtn.classList.remove('upgrade-pop');
      heartStage.classList.remove('pulse');

      void heartBtn.offsetWidth;

      heartBtn.classList.add('upgrade-pop');
      heartStage.classList.add('pulse');

      setTimeout(() => {
        heartBtn.classList.remove('upgrade-pop');
        heartStage.classList.remove('pulse');
      }, 700);
    }

    function handleHeartClick() {
      if (!currentUser) return;

      if (navigator.vibrate && window.matchMedia('(pointer: coarse)').matches) {
        navigator.vibrate(12);
      }

      spawnFloatingHearts();
      spawnBurstParticles();

      const need = clicksToFill(gameState.level);
      gameState.progress += 1;
      gameState.totalClicks += 1;

      if (gameState.progress >= need) {
        gameState.level += 1;
        gameState.progress = 0;
        renderGame();
        triggerUpgradeAnimation();
        setTip(`恭喜！你已经升到 ${gameState.level} 级。下一轮需要更多点击哦！`);
        showToast(`升级到 ${gameState.level} 级`);
      } else {
        renderGame();
        setTip(`再点 ${need - gameState.progress} 次，就可以填满并升级。`);
      }

      queueSaveGameState();
    }

    heartBtn.addEventListener('click', handleHeartClick);

    document.addEventListener('keydown', (e) => {
      if (!currentUser) return;
      if (e.code === 'Space' || e.key === 'Enter') {
        const active = document.activeElement;
        if (active === heartBtn || active === document.body || active === document.documentElement) {
          e.preventDefault();
          handleHeartClick();
        }
      }
    });

    async function init() {
      currentUser = getCurrentUser();
      renderAuthState();
      refreshAccessState();
      if (!currentUser) {
        gameState = defaultGameState();
        renderGame();
      }
    }

    window.addEventListener('storage', (e) => {
      if (e.key === LS_CURRENT_USER) {
        currentUser = getCurrentUser();
        renderAuthState();
        refreshAccessState();
      }
    });

    init();
  </script>
</body>
</html>
