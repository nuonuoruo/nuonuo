<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>在一起多少天</title>
  <style>
    :root {
      --bg: #f5f5f7;
      --panel: rgba(255, 255, 255, 0.72);
      --panel-strong: rgba(255, 255, 255, 0.9);
      --text: #1d1d1f;
      --subtext: #6e6e73;
      --primary: #0071e3;
      --primary-hover: #0060c7;
      --shadow: 0 18px 50px rgba(0, 0, 0, 0.08);
      --shadow-soft: 0 8px 24px rgba(0, 0, 0, 0.06);
      --radius-xl: 28px;
      --radius-lg: 22px;
      --radius-md: 16px;
    }

    * { box-sizing: border-box; }

    html, body {
      margin: 0;
      min-height: 100%;
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", "SF Pro Text",
        "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", sans-serif;
      -webkit-font-smoothing: antialiased;
      text-rendering: optimizeLegibility;
      background:
        radial-gradient(circle at top left, rgba(0, 113, 227, 0.10), transparent 28%),
        radial-gradient(circle at top right, rgba(255, 59, 48, 0.08), transparent 24%),
        linear-gradient(180deg, #fbfbfd 0%, #f5f5f7 100%);
    }

    body {
      padding: 24px;
    }

    .page {
      max-width: 860px;
      margin: 0 auto;
    }

    .topbar {
      position: sticky;
      top: 16px;
      z-index: 20;
      background: var(--panel);
      backdrop-filter: saturate(180%) blur(18px);
      -webkit-backdrop-filter: saturate(180%) blur(18px);
      border: 1px solid rgba(255, 255, 255, 0.7);
      border-radius: var(--radius-xl);
      box-shadow: var(--shadow-soft);
      padding: 18px 20px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
    }

    .back {
      text-decoration: none;
      color: var(--text);
      font-size: 14px;
      font-weight: 600;
      padding: 10px 14px;
      border-radius: 999px;
      background: rgba(0, 0, 0, 0.05);
      transition: background .2s ease, transform .15s ease;
      white-space: nowrap;
    }

    .back:hover {
      background: rgba(0, 0, 0, 0.08);
      transform: translateY(-1px);
    }

    .title-wrap h1 {
      margin: 0;
      font-size: 24px;
      line-height: 1.2;
      letter-spacing: -0.03em;
    }

    .title-wrap p {
      margin: 6px 0 0;
      color: var(--subtext);
      font-size: 14px;
    }

    .card {
      margin-top: 18px;
      background: rgba(255, 255, 255, 0.52);
      border: 1px solid rgba(255, 255, 255, 0.78);
      border-radius: var(--radius-xl);
      box-shadow: var(--shadow-soft);
      padding: 22px;
    }

    .hero {
      padding: 22px;
      border-radius: 24px;
      background:
        linear-gradient(135deg, rgba(0,113,227,0.12), rgba(255,255,255,0.7)),
        rgba(255,255,255,0.78);
      border: 1px solid rgba(0, 0, 0, 0.05);
      text-align: center;
    }

    .hero .label {
      font-size: 14px;
      color: var(--subtext);
      margin: 0;
    }

    .hero .days {
      margin: 10px 0 0;
      font-size: clamp(34px, 7vw, 60px);
      line-height: 1.05;
      font-weight: 900;
      letter-spacing: -0.05em;
      color: var(--text);
    }

    .hero .sub {
      margin: 10px 0 0;
      color: var(--subtext);
      font-size: 14px;
      line-height: 1.7;
    }

    .info-grid {
      margin-top: 18px;
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 14px;
    }

    .info-item {
      padding: 16px;
      border-radius: 20px;
      background: rgba(255, 255, 255, 0.72);
      border: 1px solid rgba(0, 0, 0, 0.06);
    }

    .info-item .k {
      font-size: 12px;
      color: var(--subtext);
      margin: 0 0 6px;
    }

    .info-item .v {
      font-size: 18px;
      font-weight: 800;
      margin: 0;
      letter-spacing: -0.02em;
    }

    .tips {
      margin-top: 16px;
      font-size: 12px;
      color: var(--subtext);
      line-height: 1.8;
    }

    .btn-row {
      margin-top: 18px;
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
    }

    .btn {
      border: none;
      border-radius: 999px;
      font-weight: 700;
      cursor: pointer;
      user-select: none;
      -webkit-tap-highlight-color: transparent;
      transition: transform .15s ease, background .2s ease, box-shadow .2s ease;
      text-decoration: none;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      padding: 13px 18px;
      font-size: 14px;
    }

    .primary-btn {
      background: linear-gradient(180deg, #0a84ff 0%, #0071e3 100%);
      color: #fff;
      box-shadow: 0 10px 22px rgba(0, 113, 227, 0.24);
    }

    .primary-btn:hover {
      background: linear-gradient(180deg, #2491ff 0%, var(--primary-hover) 100%);
      transform: translateY(-1px);
    }

    .ghost-btn {
      background: rgba(0, 0, 0, 0.05);
      color: var(--text);
    }

    .ghost-btn:hover {
      background: rgba(0, 0, 0, 0.08);
      transform: translateY(-1px);
    }

    @media (max-width: 720px) {
      body {
        padding: 14px;
      }

      .topbar {
        top: 10px;
        padding: 14px 16px;
        flex-direction: column;
        align-items: flex-start;
      }

      .card {
        padding: 16px;
      }

      .info-grid {
        grid-template-columns: 1fr;
      }

      .hero .days {
        font-size: 42px;
      }
    }
  </style>
</head>
<body>
  <div class="page">
    <header class="topbar">
      <a class="back" href="./index.html">← 返回主页</a>
      <div class="title-wrap">
        <h1>在一起多少天</h1>
        <p>记录属于我们的每一天</p>
      </div>
    </header>

    <main class="card">
      <section class="hero">
        <p class="label">我们已经在一起</p>
        <div class="days" id="daysText">-- 天</div>
        <p class="sub" id="subText">正在计算中…</p>
      </section>

      <div class="info-grid">
        <div class="info-item">
          <p class="k">在一起日期</p>
          <p class="v" id="startDateText">--</p>
        </div>
        <div class="info-item">
          <p class="k">今天日期</p>
          <p class="v" id="todayText">--</p>
        </div>
      </div>

      <div class="btn-row">
    
        <button class="btn ghost-btn" id="refreshBtn">刷新计算</button>
      </div>

    
    </main>
  </div>

  <script>
    // 这里改成你们“在一起”的日期
    // 格式：YYYY-MM-DD
    const START_DATE = '2023-10-29';

    const daysText = document.getElementById('daysText');
    const subText = document.getElementById('subText');
    const startDateText = document.getElementById('startDateText');
    const todayText = document.getElementById('todayText');
    const refreshBtn = document.getElementById('refreshBtn');

    function formatDate(date) {
      const y = date.getFullYear();
      const m = String(date.getMonth() + 1).padStart(2, '0');
      const d = String(date.getDate()).padStart(2, '0');
      return `${y}-${m}-${d}`;
    }

    function calculateDaysTogether() {
      const start = new Date(START_DATE);
      const today = new Date();

      start.setHours(0, 0, 0, 0);
      today.setHours(0, 0, 0, 0);

      const diffMs = today - start;
      const days = Math.floor(diffMs / (1000 * 60 * 60 * 24));

      startDateText.textContent = formatDate(start);
      todayText.textContent = formatDate(today);

      if (days < 0) {
        daysText.textContent = `还没到`;
        subText.textContent = `你设置的在一起日期是 ${formatDate(start)}，它还晚于今天。请检查日期是否写对。`;
        return;
      }

      daysText.textContent = `${days} 天`;
      subText.textContent = `从 ${formatDate(start)} 到今天，一共 ${days} 天。`;
    }

    refreshBtn.addEventListener('click', calculateDaysTogether);

    calculateDaysTogether();
    setInterval(calculateDaysTogether, 60 * 1000);
  </script>
</body>
</html>
