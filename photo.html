<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>照片墙</title>
  <style>
    :root {
      --bg: #f5f5f7;
      --panel: rgba(255, 255, 255, 0.72);
      --panel-strong: rgba(255, 255, 255, 0.9);
      --text: #1d1d1f;
      --subtext: #6e6e73;
      --line: rgba(0, 0, 0, 0.08);
      --primary: #0071e3;
      --primary-hover: #0060c7;
      --danger: #ff3b30;
      --shadow: 0 18px 50px rgba(0, 0, 0, 0.08);
      --shadow-soft: 0 8px 24px rgba(0, 0, 0, 0.06);
      --radius-xl: 28px;
      --radius-lg: 22px;
      --radius-md: 16px;
    }

    * { box-sizing: border-box; }

    html, body {
      margin: 0;
      min-height: 100%;
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", "SF Pro Text",
        "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", sans-serif;
      -webkit-font-smoothing: antialiased;
      text-rendering: optimizeLegibility;
      background:
        radial-gradient(circle at top left, rgba(0, 113, 227, 0.10), transparent 28%),
        radial-gradient(circle at top right, rgba(255, 59, 48, 0.08), transparent 24%),
        linear-gradient(180deg, #fbfbfd 0%, #f5f5f7 100%);
    }

    body { padding: 24px; }

    .page {
      max-width: 1280px;
      margin: 0 auto;
    }

    .toolbar {
      position: sticky;
      top: 16px;
      z-index: 20;
      background: var(--panel);
      backdrop-filter: saturate(180%) blur(18px);
      -webkit-backdrop-filter: saturate(180%) blur(18px);
      border: 1px solid rgba(255,255,255,.7);
      border-radius: var(--radius-xl);
      box-shadow: var(--shadow-soft);
      padding: 18px 20px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 14px;
      flex-wrap: wrap;
    }

    .toolbar-left {
      display: flex;
      align-items: center;
      gap: 12px;
      flex-wrap: wrap;
    }

    .back-btn {
      text-decoration: none;
      color: var(--text);
      background: rgba(0,0,0,.06);
      border-radius: 999px;
      padding: 11px 16px;
      font-size: 14px;
      font-weight: 600;
      transition: transform .15s ease, background .2s ease;
      white-space: nowrap;
    }

    .back-btn:hover {
      background: rgba(0,0,0,.09);
      transform: translateY(-1px);
    }

    .brand h1 {
      margin: 0;
      font-size: 28px;
      line-height: 1.15;
      letter-spacing: -0.03em;
    }

    .brand p {
      margin: 6px 0 0;
      color: var(--subtext);
      font-size: 14px;
    }

    .toolbar-right {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      align-items: center;
      margin-left: auto;
    }

    input[type="file"] {
      width: 0.1px;
      height: 0.1px;
      opacity: 0;
      overflow: hidden;
      position: absolute;
      z-index: -1;
    }

    .btn {
      border: none;
      border-radius: 999px;
      font-weight: 700;
      cursor: pointer;
      user-select: none;
      -webkit-tap-highlight-color: transparent;
      transition: transform .15s ease, background .2s ease, box-shadow .2s ease, opacity .2s ease;
      text-decoration: none;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      padding: 12px 18px;
      font-size: 14px;
      min-width: 120px;
    }

    .btn:hover { transform: translateY(-1px); }

    .choose-btn {
      background: rgba(0,0,0,.06);
      color: var(--text);
    }

    .primary-btn {
      background: linear-gradient(180deg, #0a84ff 0%, #0071e3 100%);
      color: #fff;
      box-shadow: 0 10px 22px rgba(0,113,227,.24);
    }

    .content {
      margin-top: 18px;
    }

    .gallery {
      display: grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      gap: 18px;
    }

    .photo-item {
      background: rgba(255,255,255,.58);
      border: 1px solid rgba(255,255,255,.8);
      border-radius: 24px;
      box-shadow: var(--shadow-soft);
      overflow: hidden;
    }

    .photo-preview {
      aspect-ratio: 1 / 1;
      background: rgba(0,0,0,.04);
      cursor: pointer;
      overflow: hidden;
    }

    .photo-preview img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
      transition: transform .3s ease;
    }

    .photo-preview:hover img {
      transform: scale(1.04);
    }

    .photo-action {
      margin: 12px 14px 14px;
      border: none;
      border-radius: 999px;
      padding: 10px 14px;
      font-size: 13px;
      font-weight: 700;
      cursor: pointer;
      background: rgba(255,59,48,.92);
      color: #fff;
      box-shadow: 0 8px 18px rgba(255,59,48,.18);
    }

    .loading-state,
    .empty-state {
      min-height: 320px;
      display: grid;
      place-items: center;
      text-align: center;
      color: var(--subtext);
      background: rgba(255,255,255,.55);
      border: 1px solid rgba(0,0,0,.06);
      border-radius: var(--radius-lg);
      padding: 24px;
    }

    .state-card { max-width: 360px; }

    .state-icon {
      width: 74px;
      height: 74px;
      margin: 0 auto 16px;
      border-radius: 24px;
      display: grid;
      place-items: center;
      background: linear-gradient(180deg, rgba(0,113,227,.12), rgba(0,113,227,.06));
      color: var(--primary);
    }

    .state-icon svg {
      width: 34px;
      height: 34px;
    }

    .state-title {
      margin: 0;
      font-size: 18px;
      color: var(--text);
      letter-spacing: -0.02em;
    }

    .state-desc {
      margin: 8px 0 0;
      font-size: 14px;
      line-height: 1.7;
      color: var(--subtext);
    }

    .modal {
      position: fixed;
      inset: 0;
      z-index: 100;
      display: none;
      align-items: center;
      justify-content: center;
      padding: 24px;
      background: rgba(0,0,0,.72);
      backdrop-filter: blur(18px);
      -webkit-backdrop-filter: blur(18px);
    }

    .modal.show { display: flex; }

    .modal-content {
      width: min(96vw, 1100px);
      max-height: 92vh;
      background: rgba(255,255,255,.08);
      border: 1px solid rgba(255,255,255,.18);
      border-radius: 28px;
      overflow: hidden;
      box-shadow: 0 30px 80px rgba(0,0,0,.35);
      position: relative;
    }

    .modal-close {
      position: absolute;
      top: 16px;
      right: 16px;
      width: 42px;
      height: 42px;
      display: grid;
      place-items: center;
      background: rgba(255,255,255,.14);
      color: #fff;
      font-size: 22px;
      border: none;
      border-radius: 999px;
      cursor: pointer;
      z-index: 2;
    }

    .modal-body {
      background: rgba(0,0,0,.92);
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 280px;
      max-height: 92vh;
    }

    .modal-body img {
      width: 100%;
      height: auto;
      max-height: 92vh;
      object-fit: contain;
      display: block;
      background: #000;
    }

    .modal-caption {
      position: absolute;
      left: 18px;
      right: 72px;
      bottom: 16px;
      color: rgba(255,255,255,.92);
      font-size: 13px;
      line-height: 1.5;
      white-space: pre-wrap;
      text-shadow: 0 2px 10px rgba(0,0,0,.4);
    }

    @media (max-width: 1100px) {
      .gallery {
        grid-template-columns: repeat(3, minmax(0, 1fr));
      }
    }

    @media (max-width: 820px) {
      .gallery {
        grid-template-columns: repeat(2, minmax(0, 1fr));
      }
    }

    @media (max-width: 720px) {
      body { padding: 14px; }
      .toolbar {
        top: 10px;
        padding: 14px 16px;
      }
      .toolbar-right {
        width: 100%;
        margin-left: 0;
      }
      .btn {
        width: 100%;
      }
      .gallery {
        grid-template-columns: 1fr;
      }
      .modal {
        padding: 12px;
      }
      .modal-content {
        width: 100%;
        border-radius: 22px;
      }
    }
  </style>
</head>
<body>
  <div class="page">
    <header class="toolbar">
      <div class="toolbar-left">
        <a class="back-btn" href="./index.html">← 返回主页</a>
        <div class="brand">
          <h1>照片墙</h1>
          <p>未登录可浏览，登录后可上传和删除</p>
        </div>
      </div>

      <div class="toolbar-right">
        <label class="btn choose-btn" for="fileInput" id="chooseBtn">选择图片</label>
        <input type="file" id="fileInput" accept="image/*" multiple />
        <button class="btn primary-btn" id="uploadBtn" type="button">上传图片</button>
      </div>
    </header>

    <main class="content">
      <div id="gallery" class="gallery"></div>
    </main>
  </div>

  <div id="previewModal" class="modal" aria-hidden="true">
    <div class="modal-content">
      <button class="modal-close" id="closeModal" aria-label="关闭预览">×</button>
      <div class="modal-body">
        <img id="previewImage" src="" alt="预览" />
      </div>
      <div class="modal-caption" id="previewCaption"></div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/cos-js-sdk-v5/dist/cos-js-sdk-v5.min.js"></script>
  <script src="./main.js"></script>
</body>
</html>
