<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>照片墙</title>

  <style>
    :root {
      --bg: #f5f5f7;
      --panel: rgba(255, 255, 255, 0.72);
      --panel-strong: rgba(255, 255, 255, 0.88);
      --glass: rgba(255, 255, 255, 0.48);
      --glass-strong: rgba(255, 255, 255, 0.66);
      --text: #1d1d1f;
      --subtext: #6e6e73;
      --line: rgba(0, 0, 0, 0.08);
      --primary: #0071e3;
      --primary-hover: #0060c7;
      --danger: #ff3b30;
      --shadow: 0 18px 50px rgba(0, 0, 0, 0.08);
      --shadow-soft: 0 8px 24px rgba(0, 0, 0, 0.06);
      --radius-xl: 28px;
      --radius-lg: 22px;
      --radius-md: 16px;
    }

    * { box-sizing: border-box; }

    html, body {
      margin: 0;
      min-height: 100%;
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", "SF Pro Text",
        "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", sans-serif;
      -webkit-font-smoothing: antialiased;
      text-rendering: optimizeLegibility;
      background:
        radial-gradient(circle at top left, rgba(0, 113, 227, 0.10), transparent 28%),
        radial-gradient(circle at top right, rgba(255, 59, 48, 0.08), transparent 24%),
        linear-gradient(180deg, #fbfbfd 0%, #f5f5f7 100%);
    }

    body {
      padding: 24px;
    }

    /* 顶部观察锚点：用于监听是否滚动出顶部视口，避免 scroll 频繁触发 */
    .top-sentinel {
      height: 1px;
      width: 1px;
      margin-top: -1px;
      pointer-events: none;
      opacity: 0;
    }

    .page {
      max-width: 1280px;
      margin: 0 auto;
    }

    .toolbar {
      position: sticky;
      top: 16px;
      z-index: 20;
      background: var(--panel);
      backdrop-filter: saturate(180%) blur(18px);
      -webkit-backdrop-filter: saturate(180%) blur(18px);
      border: 1px solid rgba(255,255,255,.7);
      border-radius: var(--radius-xl);
      box-shadow: var(--shadow-soft);
      padding: 18px 20px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 14px;
      flex-wrap: wrap;
      transition: padding .22s ease, transform .22s ease, opacity .22s ease, border-radius .22s ease, box-shadow .22s ease, background .22s ease;
      will-change: transform, opacity;
      contain: layout paint;
    }

    .toolbar.is-compact {
      padding: 10px 14px;
      border-radius: 22px;
      background: rgba(255, 255, 255, 0.55);
      opacity: 0.98;
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.06);
    }

    .toolbar-left {
      display: flex;
      align-items: center;
      gap: 12px;
      flex-wrap: wrap;
      min-width: 0;
      transition: gap .22s ease;
    }

    .toolbar.is-compact .toolbar-left {
      gap: 10px;
    }

    .back-btn {
      text-decoration: none;
      color: var(--text);
      background: rgba(0,0,0,.06);
      border-radius: 999px;
      padding: 11px 16px;
      font-size: 14px;
      font-weight: 600;
      transition: transform .15s ease, background .2s ease, opacity .2s ease, padding .22s ease, font-size .22s ease;
      white-space: nowrap;
      user-select: none;
      -webkit-tap-highlight-color: transparent;
    }

    .back-btn:hover {
      background: rgba(0,0,0,.09);
      transform: translateY(-1px);
    }

    .toolbar.is-compact .back-btn {
      padding: 8px 13px;
      font-size: 13px;
    }

    .brand h1 {
      margin: 0;
      font-size: 28px;
      line-height: 1.15;
      letter-spacing: -0.03em;
      transition: font-size .22s ease;
    }

    .toolbar.is-compact .brand h1 {
      font-size: 18px;
    }

    .brand p {
      margin: 6px 0 0;
      color: var(--subtext);
      font-size: 14px;
      transition: opacity .22s ease, max-height .22s ease, margin .22s ease, transform .22s ease;
      overflow: hidden;
      max-height: 40px;
    }

    .toolbar.is-compact .brand p {
      opacity: 0;
      max-height: 0;
      margin: 0;
      transform: translateY(-6px);
    }

    .toolbar-right {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      align-items: center;
      margin-left: auto;
      transition: opacity .22s ease, max-width .22s ease, margin .22s ease, transform .22s ease;
    }

    .toolbar.is-compact .toolbar-right {
      opacity: 0;
      max-width: 0;
      margin-left: 0;
      pointer-events: none;
      transform: translateY(-6px);
      overflow: hidden;
    }

    input[type="file"] {
      width: 0.1px;
      height: 0.1px;
      opacity: 0;
      overflow: hidden;
      position: absolute;
      z-index: -1;
    }

    .btn {
      border: none;
      border-radius: 999px;
      font-weight: 700;
      cursor: pointer;
      user-select: none;
      -webkit-tap-highlight-color: transparent;
      transition: transform .15s ease, background .2s ease, box-shadow .2s ease, opacity .2s ease;
      text-decoration: none;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      padding: 12px 18px;
      font-size: 14px;
      min-width: 120px;
    }

    .btn:hover { transform: translateY(-1px); }

    .choose-btn {
      background: rgba(0,0,0,.06);
      color: var(--text);
    }

    .primary-btn {
      background: linear-gradient(180deg, #0a84ff 0%, #0071e3 100%);
      color: #fff;
      box-shadow: 0 10px 22px rgba(0,113,227,.24);
    }

    .content {
      margin-top: 18px;
    }

    .gallery {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
      gap: 16px;
      align-items: start;
    }

    .photo-item {
      position: relative;
      background: rgba(255,255,255,.42);
      border: 1px solid rgba(255,255,255,.78);
      border-radius: 24px;
      box-shadow: var(--shadow-soft);
      overflow: hidden;
      backdrop-filter: saturate(180%) blur(18px);
      -webkit-backdrop-filter: saturate(180%) blur(18px);
      transition: transform .18s ease, box-shadow .18s ease, background .18s ease, border-color .18s ease;
      content-visibility: auto;
      contain-intrinsic-size: 320px;
    }

    .photo-item:hover {
      transform: translateY(-2px);
      box-shadow: 0 12px 28px rgba(0,0,0,.08);
      background: rgba(255,255,255,.52);
    }

    .photo-preview {
      aspect-ratio: 1 / 1;
      background: rgba(0,0,0,.04);
      cursor: zoom-in;
      overflow: hidden;
      position: relative;
    }

    .photo-preview img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
      transition: transform .3s ease;
      user-select: none;
      -webkit-user-drag: none;
    }

    .photo-preview:hover img {
      transform: scale(1.05);
    }

    .photo-meta,
    .photo-owner {
      position: relative;
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 12px;
      padding: 12px 14px 58px;
      font-size: 12px;
      line-height: 1.55;
      color: var(--text);
      background: linear-gradient(180deg, rgba(255,255,255,.72), rgba(255,255,255,.48));
      border-top: 1px solid rgba(255,255,255,.68);
      backdrop-filter: saturate(180%) blur(24px);
      -webkit-backdrop-filter: saturate(180%) blur(24px);
      text-shadow: 0 1px 0 rgba(255,255,255,.35);
    }

    .photo-meta strong,
    .photo-owner strong {
      color: var(--text);
      font-weight: 700;
    }

    .photo-meta > div:last-child,
    .photo-owner > div:last-child {
      color: rgba(29, 29, 31, .72);
      white-space: nowrap;
      flex-shrink: 0;
    }

    .photo-item .photo-action,
    .photo-item .delete-btn,
    .photo-item .btn-danger {
      position: absolute;
      right: 12px;
      bottom: 12px;
      z-index: 4;
      width: 42px;
      height: 42px;
      min-width: 42px;
      padding: 0;
      border: none;
      border-radius: 999px;
      display: inline-grid;
      place-items: center;
      font-size: 18px;
      font-weight: 800;
      line-height: 1;
      cursor: pointer;
      color: #fff;
      background: linear-gradient(180deg, rgba(255,82,74,.98), rgba(255,59,48,.96));
      box-shadow: 0 10px 22px rgba(255,59,48,.22);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      transition: transform .15s ease, filter .2s ease, box-shadow .2s ease, opacity .2s ease;
      overflow: hidden;
      white-space: nowrap;
    }

    .photo-item .photo-action:hover,
    .photo-item .delete-btn:hover,
    .photo-item .btn-danger:hover {
      transform: translateY(-1px) scale(1.03);
      filter: brightness(1.02);
      box-shadow: 0 12px 26px rgba(255,59,48,.26);
    }

    .loading-state,
    .empty-state {
      min-height: 320px;
      display: grid;
      place-items: center;
      text-align: center;
      color: var(--subtext);
      background: rgba(255,255,255,.55);
      border: 1px solid rgba(0,0,0,.06);
      border-radius: var(--radius-lg);
      padding: 24px;
    }

    .state-card {
      max-width: 360px;
    }

    .state-icon {
      width: 74px;
      height: 74px;
      margin: 0 auto 16px;
      border-radius: 24px;
      display: grid;
      place-items: center;
      background: linear-gradient(180deg, rgba(0,113,227,.12), rgba(0,113,227,.06));
      color: var(--primary);
    }

    .state-icon svg {
      width: 34px;
      height: 34px;
    }

    .state-title {
      margin: 0;
      font-size: 18px;
      color: var(--text);
      letter-spacing: -0.02em;
    }

    .state-desc {
      margin: 8px 0 0;
      font-size: 14px;
      line-height: 1.7;
      color: var(--subtext);
    }

    .modal {
      position: fixed;
      inset: 0;
      z-index: 100;
      display: none;
      align-items: center;
      justify-content: center;
      padding: 24px;
      background: rgba(0,0,0,.72);
      backdrop-filter: blur(18px);
      -webkit-backdrop-filter: blur(18px);
    }

    .modal.show { display: flex; }

    .modal-content {
      width: min(96vw, 1100px);
      max-height: 92vh;
      background: rgba(255,255,255,.08);
      border: 1px solid rgba(255,255,255,.18);
      border-radius: 28px;
      overflow: hidden;
      box-shadow: 0 30px 80px rgba(0,0,0,.35);
      position: relative;
    }

    .modal-close {
      position: absolute;
      top: 16px;
      right: 16px;
      width: 42px;
      height: 42px;
      display: grid;
      place-items: center;
      background: rgba(255,255,255,.14);
      color: #fff;
      font-size: 22px;
      border: none;
      border-radius: 999px;
      cursor: pointer;
      z-index: 2;
      transition: transform .15s ease, background .2s ease;
    }

    .modal-close:hover {
      transform: scale(1.04);
      background: rgba(255,255,255,.20);
    }

    .modal-body {
      background: rgba(0,0,0,.92);
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 280px;
      max-height: 92vh;
    }

    .modal-body img {
      width: 100%;
      height: auto;
      max-height: 92vh;
      object-fit: contain;
      display: block;
      background: #000;
      user-select: none;
      -webkit-user-drag: none;
    }

    .modal-caption {
      position: absolute;
      left: 18px;
      right: 72px;
      bottom: 16px;
      color: rgba(255,255,255,.92);
      font-size: 13px;
      line-height: 1.55;
      white-space: pre-wrap;
      text-shadow: 0 2px 10px rgba(0,0,0,.4);
      pointer-events: none;
    }

    @media (max-width: 1100px) {
      .gallery {
        grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
      }
    }

    @media (max-width: 820px) {
      .gallery {
        grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
        gap: 14px;
      }
    }

    @media (max-width: 720px) {
      body {
        padding: 14px;
      }

      .toolbar {
        top: 10px;
        padding: 14px 16px;
        border-radius: 22px;
      }

      .toolbar.is-compact {
        padding: 10px 12px;
      }

      .toolbar-left {
        width: 100%;
      }

      .toolbar-right {
        width: 100%;
        margin-left: 0;
      }

      .toolbar.is-compact .toolbar-right {
        display: none;
      }

      .btn {
        width: 100%;
      }

      .brand h1 {
        font-size: 24px;
      }

      .brand p {
        font-size: 13px;
      }

      .gallery {
        grid-template-columns: repeat(2, minmax(0, 1fr));
        gap: 12px;
      }

      .photo-item {
        border-radius: 18px;
      }

      .photo-preview {
        aspect-ratio: 1 / 1;
      }

      .photo-meta,
      .photo-owner {
        padding: 10px 11px 52px;
      }

      .photo-item .photo-action,
      .photo-item .delete-btn,
      .photo-item .btn-danger {
        right: 10px;
        bottom: 10px;
        width: 38px;
        height: 38px;
        min-width: 38px;
        font-size: 16px;
      }

      .modal {
        padding: 12px;
      }

      .modal-content {
        width: 100%;
        border-radius: 22px;
      }

      .modal-caption {
        left: 14px;
        right: 64px;
        bottom: 12px;
        font-size: 12px;
      }
    }

    @media (max-width: 420px) {
      .gallery {
        grid-template-columns: repeat(2, minmax(0, 1fr));
        gap: 10px;
      }

      .photo-item .photo-action,
      .photo-item .delete-btn,
      .photo-item .btn-danger {
        width: 36px;
        height: 36px;
        min-width: 36px;
        right: 8px;
        bottom: 8px;
      }
    }

    @media (max-width: 340px) {
      .gallery {
        grid-template-columns: 1fr;
      }
    }

    @media (prefers-reduced-motion: reduce) {
      *,
      *::before,
      *::after {
        scroll-behavior: auto !important;
        transition: none !important;
        animation: none !important;
      }
    }
  </style>
</head>

<body>
  <div class="top-sentinel" id="topSentinel" aria-hidden="true"></div>

  <div class="page">
    <header class="toolbar" id="toolbar">
      <div class="toolbar-left">
        <a class="back-btn" href="./index.html">← 返回主页</a>
        <div class="brand">
          <h1>照片墙</h1>
          <p>未登录可浏览，登录后可上传和删除</p>
        </div>
      </div>

      <div class="toolbar-right">
        <label class="btn choose-btn" for="fileInput" id="chooseBtn">选择图片</label>
        <input type="file" id="fileInput" accept="image/*" multiple />
        <button class="btn primary-btn" id="uploadBtn" type="button">上传图片</button>
      </div>
    </header>

    <main class="content">
      <div id="gallery" class="gallery"></div>
    </main>
  </div>

  <div id="previewModal" class="modal" aria-hidden="true">
    <div class="modal-content">
      <button class="modal-close" id="closeModal" aria-label="关闭预览">×</button>
      <div class="modal-body">
        <img id="previewImage" src="" alt="预览" />
      </div>
      <div class="modal-caption" id="previewCaption"></div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/cos-js-sdk-v5/dist/cos-js-sdk-v5.min.js"></script>
  <script src="./main.js"></script>

  <script>
    (function () {
      const gallery = document.getElementById('gallery');
      const modal = document.getElementById('previewModal');
      const modalImg = document.getElementById('previewImage');
      const modalCaption = document.getElementById('previewCaption');
      const closeBtn = document.getElementById('closeModal');
      const toolbar = document.getElementById('toolbar');
      const topSentinel = document.getElementById('topSentinel');

      let lastFocusedEl = null;

      function openPreview(src, caption = '') {
        if (!src) return;
        lastFocusedEl = document.activeElement;
        modalImg.src = src;
        modalCaption.textContent = caption || '';
        modal.classList.add('show');
        modal.setAttribute('aria-hidden', 'false');
        document.body.style.overflow = 'hidden';
        closeBtn.focus({ preventScroll: true });
      }

      function closePreview() {
        modal.classList.remove('show');
        modal.setAttribute('aria-hidden', 'true');
        document.body.style.overflow = '';
        modalImg.src = '';
        modalCaption.textContent = '';
        if (lastFocusedEl && typeof lastFocusedEl.focus === 'function') {
          lastFocusedEl.focus({ preventScroll: true });
        }
      }

      function getTextFromElement(root, selectors) {
        for (const selector of selectors) {
          const el = root.querySelector(selector);
          if (el) {
            const text = (el.textContent || '').trim();
            if (text) return text;
          }
        }
        return '';
      }

      function getCardCaption(card) {
        if (!card) return '';

        const uploader = getTextFromElement(card, [
          '[data-uploader]',
          '.uploader',
          '.photo-uploader',
          '.author',
          '.photo-author',
          '[class*="uploader"]',
          '[class*="author"]',
          '[class*="user"]',
          '[class*="name"]'
        ]);

        const dateText = getTextFromElement(card, [
          '[data-date]',
          '.date',
          '.photo-date',
          '.upload-date',
          '.time',
          '[class*="date"]',
          '[class*="time"]'
        ]);

        const extraText = getTextFromElement(card, [
          '.caption',
          '.photo-caption-text',
          '.desc',
          '.description',
          '[class*="caption"]',
          '[class*="desc"]',
          '[class*="description"]'
        ]);

        const parts = [];
        if (uploader) parts.push(`上传者：${uploader}`);
        if (dateText) parts.push(`上传日期：${dateText}`);
        if (extraText && extraText !== uploader && extraText !== dateText) parts.push(extraText);

        return parts.join('\n');
      }

      if (gallery) {
        gallery.addEventListener('click', function (e) {
          if (e.target.closest('button, a, input, label, textarea, select')) return;
          const img = e.target.closest ? e.target.closest('.photo-preview img, .photo-item img') : null;
          if (!img || !gallery.contains(img)) return;

          const card = img.closest('.photo-item');
          const src = img.dataset.fullsrc || img.dataset.src || img.currentSrc || img.src;
          const caption = getCardCaption(card) || img.alt || img.title || '';
          openPreview(src, caption);
        });
      }

      closeBtn.addEventListener('click', closePreview);

      modal.addEventListener('click', function (e) {
        if (e.target === modal || e.target.classList.contains('modal-body')) {
          closePreview();
        }
      });

      document.addEventListener('keydown', function (e) {
        if (e.key === 'Escape' && modal.classList.contains('show')) {
          closePreview();
        }
      });

      // 更轻量的顶部缩略：IntersectionObserver，避免 scroll 频繁计算卡顿
      if ('IntersectionObserver' in window && topSentinel) {
        const observer = new IntersectionObserver((entries) => {
          const entry = entries[0];
          const shouldCompact = !entry.isIntersecting;
          toolbar.classList.toggle('is-compact', shouldCompact);
        }, {
          threshold: 0,
          rootMargin: '0px'
        });

        observer.observe(topSentinel);
      } else {
        // 兜底：不支持 IO 的旧浏览器再用节流滚动
        let ticking = false;
        function updateToolbarState() {
          toolbar.classList.toggle('is-compact', window.scrollY > 18);
          ticking = false;
        }

        window.addEventListener('scroll', function () {
          if (ticking) return;
          ticking = true;
          window.requestAnimationFrame(updateToolbarState);
        }, { passive: true });

        updateToolbarState();
      }
    })();
  </script>
</body>
</html>
