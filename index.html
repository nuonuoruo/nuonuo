<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>主页</title>
  <style>
    :root {
      --bg: #f5f5f7;
      --panel: rgba(255, 255, 255, 0.72);
      --panel-strong: rgba(255, 255, 255, 0.9);
      --text: #1d1d1f;
      --subtext: #6e6e73;
      --line: rgba(0, 0, 0, 0.08);
      --primary: #0071e3;
      --shadow: 0 18px 50px rgba(0, 0, 0, 0.08);
      --shadow-soft: 0 8px 24px rgba(0, 0, 0, 0.06);
      --radius-xl: 28px;
      --radius-lg: 22px;
      --radius-md: 16px;
    }

    * { box-sizing: border-box; }

    html, body {
      margin: 0;
      min-height: 100%;
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", "SF Pro Text",
        "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", sans-serif;
      -webkit-font-smoothing: antialiased;
      text-rendering: optimizeLegibility;
      overflow: hidden;
      background:
        radial-gradient(circle at top left, rgba(0, 113, 227, 0.14), transparent 26%),
        radial-gradient(circle at top right, rgba(255, 59, 48, 0.09), transparent 24%),
        radial-gradient(circle at bottom center, rgba(52, 199, 89, 0.10), transparent 28%),
        linear-gradient(180deg, #fbfbfd 0%, #f5f5f7 100%);
    }

    .desktop {
      position: relative;
      width: 100vw;
      height: 100vh;
      padding: 24px;
    }

    .topbar {
      height: 54px;
      padding: 0 18px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      background: var(--panel);
      backdrop-filter: saturate(180%) blur(18px);
      -webkit-backdrop-filter: saturate(180%) blur(18px);
      border: 1px solid rgba(255, 255, 255, 0.72);
      border-radius: 22px;
      box-shadow: var(--shadow-soft);
    }

    .topbar-left,
    .topbar-right {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .logo-dot {
      width: 12px;
      height: 12px;
      border-radius: 999px;
      background: linear-gradient(180deg, #0a84ff, #0071e3);
      box-shadow: 0 6px 16px rgba(0, 113, 227, 0.24);
    }

    .brand {
      font-size: 14px;
      font-weight: 700;
      letter-spacing: -0.02em;
    }

    .time {
      font-size: 13px;
      color: var(--subtext);
      padding: 8px 12px;
      border-radius: 999px;
      background: rgba(255, 255, 255, 0.42);
      border: 1px solid rgba(0, 0, 0, 0.05);
    }

    .desktop-main {
      position: absolute;
      inset: 78px 24px 24px;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
    }

    .welcome {
      max-width: 720px;
      margin-top: 24px;
      padding: 28px;
      border-radius: var(--radius-xl);
      background: rgba(255, 255, 255, 0.48);
      border: 1px solid rgba(255, 255, 255, 0.8);
      backdrop-filter: blur(18px);
      -webkit-backdrop-filter: blur(18px);
      box-shadow: var(--shadow-soft);
    }

    .welcome h1 {
      margin: 0;
      font-size: clamp(30px, 4vw, 54px);
      line-height: 1.06;
      letter-spacing: -0.05em;
    }

    .welcome p {
      margin: 14px 0 0;
      font-size: 16px;
      line-height: 1.8;
      color: var(--subtext);
      max-width: 58ch;
    }

    .app-area {
      display: flex;
      align-items: flex-start;
      gap: 18px;
      flex-wrap: wrap;
      margin-top: 34px;
    }

    .app-card {
      width: 128px;
      text-decoration: none;
      color: inherit;
      user-select: none;
      -webkit-tap-highlight-color: transparent;
      transition: transform .18s ease, box-shadow .18s ease;
    }

    .app-card:hover {
      transform: translateY(-4px);
    }

    .app-card:hover .app-icon {
      box-shadow: 0 18px 36px rgba(0, 0, 0, 0.12);
    }

    .app-icon {
      width: 96px;
      height: 96px;
      margin: 0 auto;
      border-radius: 22px;
      display: grid;
      place-items: center;
      background:
        linear-gradient(135deg, rgba(255,255,255,0.42), rgba(255,255,255,0.18)),
        linear-gradient(180deg, #0a84ff 0%, #0071e3 100%);
      box-shadow: 0 14px 30px rgba(0, 113, 227, 0.22);
      border: 1px solid rgba(255,255,255,0.28);
      position: relative;
      overflow: hidden;
    }

    .app-icon::before {
      content: "";
      position: absolute;
      inset: -20% -30%;
      background: radial-gradient(circle at 30% 30%, rgba(255,255,255,0.45), transparent 35%);
      transform: rotate(12deg);
    }

    .app-icon svg {
      width: 42px;
      height: 42px;
      position: relative;
      z-index: 1;
      filter: drop-shadow(0 4px 10px rgba(0, 0, 0, 0.12));
    }

    .app-name {
      margin-top: 12px;
      text-align: center;
      font-size: 13px;
      font-weight: 600;
      color: var(--text);
    }

    .app-desc {
      margin-top: 6px;
      text-align: center;
      font-size: 12px;
      color: var(--subtext);
      line-height: 1.5;
    }

    @media (max-width: 720px) {
      html, body {
        overflow: auto;
      }

      .desktop {
        padding: 14px;
      }

      .desktop-main {
        inset: 72px 14px 14px;
      }

      .topbar {
        height: auto;
        min-height: 54px;
        padding: 12px 14px;
        gap: 10px;
      }

      .welcome {
        padding: 20px;
        margin-top: 18px;
      }

      .app-card {
        width: 104px;
      }

      .app-icon {
        width: 84px;
        height: 84px;
        border-radius: 20px;
      }
    }
  </style>
</head>
<body>
  <div class="desktop">
    <header class="topbar">
      <div class="topbar-left">
        <div class="logo-dot" aria-hidden="true"></div>
        <div class="brand">我的桌面</div>
      </div>
      <div class="topbar-right">
        <div class="time" id="clock">--:--</div>
      </div>
    </header>

    <main class="desktop-main">
      <section>
        <div class="welcome">
          <h1>欢迎我家小宝！</h1>
          <p>
            这是我们的小网页，记录我们的一点一滴
          </p>
<div class="app-area">
  <a class="app-card" href="./photo.html" aria-label="进入照片墙">
    <div class="app-icon">
      <svg viewBox="0 0 24 24" fill="none" aria-hidden="true">
        <path d="M7.5 7.75C7.5 5.679 9.179 4 11.25 4h1.5C14.821 4 16.5 5.679 16.5 7.75v1c0 .414.336.75.75.75h1.25A2.5 2.5 0 0 1 21 12v4.5a3.5 3.5 0 0 1-3.5 3.5h-11A3.5 3.5 0 0 1 3 16.5V12a2.5 2.5 0 0 1 2.5-2.5h1.25c.414 0 .75-.336.75-.75v-1Z" fill="white" opacity="0.95"/>
        <path d="M8 18.75c2.2 0 4-1.79 4-4s-1.8-4-4-4-4 1.79-4 4 1.8 4 4 4Z" fill="#D1D1D6"/>
        <path d="M16 10.5a1.5 1.5 0 1 0 0-3 1.5 1.5 0 0 0 0 3Z" fill="#D1D1D6"/>
      </svg>
    </div>
    <div class="app-name">照片墙</div>
    <div class="app-desc">点击进入</div>
  </a>

  <a class="app-card" href="./days.html" aria-label="进入在一起多少天">
    <div class="app-icon">
      <svg viewBox="0 0 24 24" fill="none" aria-hidden="true">
        <path d="M7 4.5v2M17 4.5v2M5.5 8.5h13" stroke="white" stroke-width="1.9" stroke-linecap="round"/>
        <path d="M6.5 6.5h11A2.5 2.5 0 0 1 20 9v9a2.5 2.5 0 0 1-2.5 2.5h-11A2.5 2.5 0 0 1 4 18V9a2.5 2.5 0 0 1 2.5-2.5Z" stroke="white" stroke-width="1.7" opacity="0.95"/>
        <path d="M8 12.5h8M8 16h5" stroke="#D1D1D6" stroke-width="1.8" stroke-linecap="round"/>
      </svg>
    </div>
    <div class="app-name">在一起多少天</div>
    <div class="app-desc">点击进入</div>
  </a>

  <a class="app-card" href="./message.html" aria-label="进入留言墙">
    <div class="app-icon">
      <svg viewBox="0 0 24 24" fill="none" aria-hidden="true">
        <path d="M6.5 5.5h11A2.5 2.5 0 0 1 20 8v6a2.5 2.5 0 0 1-2.5 2.5H12l-4.5 3v-3H6.5A2.5 2.5 0 0 1 4 14V8a2.5 2.5 0 0 1 2.5-2.5Z" stroke="white" stroke-width="1.8" stroke-linejoin="round"/>
        <path d="M7.5 9h9M7.5 12h6.5" stroke="#D1D1D6" stroke-width="1.8" stroke-linecap="round"/>
      </svg>
    </div>
    <div class="app-name">留言墙</div>
    <div class="app-desc">点击进入</div>
  </a>
</div>
                </div>
      </section>
    </main>
  </div>

  <script>
    function updateClock() {
      const el = document.getElementById('clock');
      const now = new Date();
      const h = String(now.getHours()).padStart(2, '0');
      const m = String(now.getMinutes()).padStart(2, '0');
      el.textContent = `${h}:${m}`;
    }
    updateClock();
    setInterval(updateClock, 1000);
  </script>
</body>
</html>
