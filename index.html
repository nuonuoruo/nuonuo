<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>照片墙</title>

  <style>
    :root {
      --bg: #f5f5f7;
      --panel: rgba(255, 255, 255, 0.72);
      --panel-strong: rgba(255, 255, 255, 0.9);
      --text: #1d1d1f;
      --subtext: #6e6e73;
      --line: rgba(0, 0, 0, 0.08);
      --primary: #0071e3;
      --primary-hover: #0060c7;
      --danger: #ff3b30;
      --shadow: 0 18px 50px rgba(0, 0, 0, 0.08);
      --shadow-soft: 0 8px 24px rgba(0, 0, 0, 0.06);
      --radius-xl: 28px;
      --radius-lg: 22px;
      --radius-md: 16px;
      --radius-sm: 12px;
    }

    * {
      box-sizing: border-box;
    }

    html, body {
      margin: 0;
      padding: 0;
      min-height: 100%;
      background:
        radial-gradient(circle at top left, rgba(0, 113, 227, 0.10), transparent 28%),
        radial-gradient(circle at top right, rgba(255, 59, 48, 0.08), transparent 24%),
        linear-gradient(180deg, #fbfbfd 0%, #f5f5f7 100%);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", "SF Pro Text",
        "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", sans-serif;
      -webkit-font-smoothing: antialiased;
      text-rendering: optimizeLegibility;
    }

    body {
      padding: 24px;
    }

    .page {
      max-width: 1280px;
      margin: 0 auto;
    }

    .topbar {
      position: sticky;
      top: 16px;
      z-index: 20;
      background: var(--panel);
      backdrop-filter: saturate(180%) blur(18px);
      -webkit-backdrop-filter: saturate(180%) blur(18px);
      border: 1px solid rgba(255, 255, 255, 0.7);
      border-radius: var(--radius-xl);
      box-shadow: var(--shadow-soft);
      padding: 22px 22px 18px;
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 14px;
      margin-bottom: 18px;
    }

    .brand-mark {
      width: 48px;
      height: 48px;
      border-radius: 16px;
      background: linear-gradient(135deg, #1d1d1f 0%, #4b4b50 100%);
      display: grid;
      place-items: center;
      color: white;
      box-shadow: 0 10px 24px rgba(0, 0, 0, 0.14);
      flex: 0 0 auto;
    }

    .brand-mark svg {
      width: 24px;
      height: 24px;
      display: block;
    }

    .brand-text h1 {
      margin: 0;
      font-size: 28px;
      line-height: 1.15;
      letter-spacing: -0.03em;
    }

    .brand-text p {
      margin: 6px 0 0;
      color: var(--subtext);
      font-size: 14px;
    }

    .toolbar {
      display: flex;
      gap: 12px;
      align-items: center;
      flex-wrap: wrap;
    }

    .file-wrap {
      position: relative;
      flex: 1 1 320px;
      min-width: 240px;
      border: 1px dashed rgba(0, 0, 0, 0.14);
      background: rgba(255, 255, 255, 0.62);
      border-radius: 18px;
      padding: 14px 16px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
    }

    .file-info {
      min-width: 0;
    }

    .file-info .label {
      display: block;
      font-size: 13px;
      color: var(--subtext);
      margin-bottom: 4px;
    }

    .file-info .name {
      font-size: 14px;
      font-weight: 600;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      max-width: 100%;
    }

    input[type="file"] {
      width: 0.1px;
      height: 0.1px;
      opacity: 0;
      overflow: hidden;
      position: absolute;
      z-index: -1;
    }

    .choose-btn,
    .primary-btn,
    .modal-close {
      border: none;
      border-radius: 999px;
      font-weight: 600;
      cursor: pointer;
      transition: transform .15s ease, background .2s ease, box-shadow .2s ease, opacity .2s ease;
      outline: none;
      user-select: none;
      -webkit-tap-highlight-color: transparent;
    }

    .choose-btn {
      background: rgba(0, 0, 0, 0.06);
      color: var(--text);
      padding: 11px 16px;
      font-size: 14px;
      white-space: nowrap;
    }

    .choose-btn:hover {
      background: rgba(0, 0, 0, 0.09);
      transform: translateY(-1px);
    }

    .primary-btn {
      background: linear-gradient(180deg, #0a84ff 0%, #0071e3 100%);
      color: #fff;
      padding: 12px 20px;
      font-size: 14px;
      box-shadow: 0 10px 22px rgba(0, 113, 227, 0.24);
      white-space: nowrap;
      min-width: 120px;
    }

    .primary-btn:hover {
      background: linear-gradient(180deg, #2491ff 0%, var(--primary-hover) 100%);
      transform: translateY(-1px);
      box-shadow: 0 12px 26px rgba(0, 113, 227, 0.28);
    }

    .primary-btn:disabled {
      opacity: 0.65;
      cursor: not-allowed;
      transform: none;
      box-shadow: none;
    }

    .primary-btn:active,
    .choose-btn:active,
    .photo-action:active,
    .modal-close:active {
      transform: translateY(0);
    }

    .content {
      margin-top: 18px;
      background: rgba(255, 255, 255, 0.42);
      border: 1px solid rgba(255, 255, 255, 0.75);
      border-radius: var(--radius-xl);
      padding: 18px;
      box-shadow: var(--shadow-soft);
    }

    #gallery {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
      gap: 18px;
    }

    .empty-state,
    .loading-state {
      grid-column: 1 / -1;
      min-height: 320px;
      display: grid;
      place-items: center;
      text-align: center;
      color: var(--subtext);
      background: rgba(255, 255, 255, 0.55);
      border: 1px solid rgba(0, 0, 0, 0.06);
      border-radius: var(--radius-lg);
      padding: 24px;
    }

    .state-card {
      max-width: 360px;
    }

    .state-icon {
      width: 74px;
      height: 74px;
      margin: 0 auto 16px;
      border-radius: 24px;
      display: grid;
      place-items: center;
      background: linear-gradient(180deg, rgba(0, 113, 227, 0.12), rgba(0, 113, 227, 0.06));
      color: var(--primary);
    }

    .state-icon svg {
      width: 34px;
      height: 34px;
    }

    .state-title {
      margin: 0;
      font-size: 18px;
      color: var(--text);
      letter-spacing: -0.02em;
    }

    .state-desc {
      margin: 8px 0 0;
      font-size: 14px;
      line-height: 1.7;
      color: var(--subtext);
    }

    .photo-item {
      background: var(--panel-strong);
      border: 1px solid rgba(255, 255, 255, 0.85);
      border-radius: 24px;
      overflow: hidden;
      box-shadow: var(--shadow);
      transition: transform .2s ease, box-shadow .2s ease;
      position: relative;
    }

    .photo-item:hover {
      transform: translateY(-4px);
      box-shadow: 0 22px 54px rgba(0, 0, 0, 0.12);
    }

    .photo-preview {
      position: relative;
      aspect-ratio: 1 / 1;
      background:
        linear-gradient(135deg, rgba(0,0,0,0.04), rgba(255,255,255,0.1)),
        #f2f2f7;
      overflow: hidden;
      cursor: pointer;
    }

    .photo-preview img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
      transform: scale(1.01);
      transition: transform .35s ease;
    }

    .photo-item:hover .photo-preview img {
      transform: scale(1.04);
    }

    .photo-meta {
      padding: 14px 14px 16px;
    }

    .photo-name {
      font-size: 13px;
      color: var(--text);
      font-weight: 600;
      line-height: 1.45;
      word-break: break-all;
      margin-bottom: 12px;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
      min-height: 38px;
    }

    .photo-actions {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 10px;
    }

    .photo-badge {
      font-size: 12px;
      color: var(--subtext);
      background: rgba(0, 0, 0, 0.04);
      padding: 6px 10px;
      border-radius: 999px;
      max-width: 100%;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .photo-action {
      border: none;
      background: rgba(255, 59, 48, 0.10);
      color: var(--danger);
      padding: 8px 12px;
      border-radius: 999px;
      font-size: 13px;
      font-weight: 700;
      cursor: pointer;
      transition: background .2s ease, transform .15s ease;
      flex: 0 0 auto;
    }

    .photo-action:hover {
      background: rgba(255, 59, 48, 0.16);
      transform: translateY(-1px);
    }

    hr {
      border: none;
      border-top: 1px solid rgba(0, 0, 0, 0.06);
      margin: 18px 0 18px;
    }

    .footer-tip {
      margin-top: 14px;
      color: var(--subtext);
      font-size: 12px;
      text-align: center;
    }

    /* 预览弹窗 */
    .modal {
      position: fixed;
      inset: 0;
      z-index: 100;
      display: none;
      align-items: center;
      justify-content: center;
      padding: 24px;
      background: rgba(0, 0, 0, 0.72);
      backdrop-filter: blur(18px);
      -webkit-backdrop-filter: blur(18px);
    }

    .modal.show {
      display: flex;
    }

    .modal-content {
      width: min(96vw, 1100px);
      max-height: 92vh;
      background: rgba(255, 255, 255, 0.08);
      border: 1px solid rgba(255, 255, 255, 0.18);
      border-radius: 28px;
      overflow: hidden;
      box-shadow: 0 30px 80px rgba(0, 0, 0, 0.35);
      position: relative;
    }

    .modal-close {
      position: absolute;
      top: 16px;
      right: 16px;
      width: 42px;
      height: 42px;
      display: grid;
      place-items: center;
      background: rgba(255, 255, 255, 0.14);
      color: #fff;
      font-size: 22px;
      z-index: 2;
    }

    .modal-close:hover {
      background: rgba(255, 255, 255, 0.22);
    }

    .modal-body {
      background: rgba(0, 0, 0, 0.92);
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 280px;
      max-height: 92vh;
    }

    .modal-body img {
      width: 100%;
      height: auto;
      max-height: 92vh;
      object-fit: contain;
      display: block;
      background: #000;
    }

    .modal-caption {
      position: absolute;
      left: 18px;
      right: 72px;
      bottom: 16px;
      color: rgba(255, 255, 255, 0.92);
      font-size: 13px;
      line-height: 1.4;
      word-break: break-all;
      text-shadow: 0 2px 10px rgba(0, 0, 0, 0.4);
      pointer-events: none;
    }

    @media (max-width: 720px) {
      body {
        padding: 14px;
      }

      .topbar {
        top: 10px;
        padding: 18px 16px 16px;
        border-radius: 22px;
      }

      .brand-text h1 {
        font-size: 24px;
      }

      .content {
        padding: 14px;
      }

      #gallery {
        grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
        gap: 14px;
      }

      .file-wrap {
        padding: 12px 14px;
      }

      .primary-btn,
      .choose-btn {
        width: 100%;
      }

      .toolbar {
        align-items: stretch;
      }

      .modal {
        padding: 12px;
      }

      .modal-content {
        width: 100%;
        border-radius: 22px;
      }

      .modal-caption {
        left: 14px;
        right: 64px;
        bottom: 12px;
      }
    }
  </style>
</head>

<body>
  <div class="page">
    <header class="topbar">
      <div class="brand">
        <div class="brand-mark" aria-hidden="true">
          <svg viewBox="0 0 24 24" fill="none">
            <path d="M7.5 7.75C7.5 5.679 9.179 4 11.25 4h1.5C14.821 4 16.5 5.679 16.5 7.75v1c0 .414.336.75.75.75h1.25A2.5 2.5 0 0 1 21 12v4.5a3.5 3.5 0 0 1-3.5 3.5h-11A3.5 3.5 0 0 1 3 16.5V12a2.5 2.5 0 0 1 2.5-2.5h1.25c.414 0 .75-.336.75-.75v-1Z" fill="white" opacity="0.95"/>
            <path d="M8 18.75c2.2 0 4-1.79 4-4s-1.8-4-4-4-4 1.79-4 4 1.8 4 4 4Z" fill="#D1D1D6"/>
            <path d="M16 10.5a1.5 1.5 0 1 0 0-3 1.5 1.5 0 0 0 0 3Z" fill="#D1D1D6"/>
          </svg>
        </div>
        <div class="brand-text">
          <h1>照片墙</h1>
          <p>上传、浏览、删除照片，点击图片可放大预览</p>
        </div>
      </div>

      <div class="toolbar">
        <div class="file-wrap">
          <div class="file-info">
            <span class="label">选择图片</span>
            <span class="name" id="fileName">未选择文件</span>
          </div>

          <label class="choose-btn" for="fileInput">选择文件</label>
          <input type="file" id="fileInput" accept="image/*" />
        </div>

        <button id="uploadBtn" class="primary-btn">上传照片</button>
      </div>
    </header>

    <main class="content">
      <hr />
      <div id="gallery"></div>
      <div class="footer-tip">提示：上传后会自动刷新相册列表，点击图片可查看大图</div>
    </main>
  </div>

  <!-- 预览弹窗 -->
  <div id="previewModal" class="modal" aria-hidden="true">
    <div class="modal-content">
      <button class="modal-close" id="closeModal" aria-label="关闭预览">×</button>
      <div class="modal-body">
        <img id="previewImage" src="" alt="预览图片" />
      </div>
      <div class="modal-caption" id="previewCaption"></div>
    </div>
  </div>

  <!-- 引入 COS SDK -->
  <script src="https://cdn.jsdelivr.net/npm/cos-js-sdk-v5/dist/cos-js-sdk-v5.min.js"></script>
  <script src="./main.js"></script>

  <script>
    const fileInput = document.getElementById('fileInput');
    const fileName = document.getElementById('fileName');

    fileInput.addEventListener('change', () => {
      fileName.textContent = fileInput.files[0] ? fileInput.files[0].name : '未选择文件';
    });
  </script>
</body>
</html>
